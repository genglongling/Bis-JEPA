defaults:
  - _self_
  - env: pusht
  - encoder: dino
  - action_encoder: proprio
  - proprio_encoder: proprio
  - decoder: vqvae
  - predictor: vit
  - override hydra/launcher: submitit_slurm

# base path to save model outputs. Checkpoints will be saved to ${ckpt_base_path}/outputs.
ckpt_base_path: ./ # put absolute path here

hydra:
  run:
    dir: ${ckpt_base_path}/outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ${ckpt_base_path}/outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    submitit_folder: ${hydra.sweep.dir}/.submitit/%j
    nodes: 1
    tasks_per_node: 1
    cpus_per_task: 8
    mem_gb: 512
    gres: "gpu:h100:1"
    timeout_min: 2880
    setup: ["export DEBUGVAR=$(scontrol show hostnames $SLURM_JOB_NODELIST)",
            export MASTER_ADDR="$(scontrol show hostnames $SLURM_JOB_NODELIST | head -n 1)",
            "export MASTER_PORT=$(for port in $(shuf -i 30000-65500 -n 20); do if [[ $(netstat -tupln 2>&1 | grep $port | wc -l) -eq 0 ]] ; then echo $port; break; fi; done;)",]

training:
  seed: 0
  epochs: 100
  batch_size: 40 # should >= nodes * tasks_per_node
  save_every_x_epoch: 1
  reconstruct_every_x_batch: 500
  num_reconstruct_samples: 6
  # Grids: save to <train|valid>/*.png; optional W&B media (scalars still always logged)
  log_image_mosaics_to_wandb: true
  # When has_decoder: false, still log ground-truth frames (verifies data + context length)
  log_ground_truth_mosaic: true
  encoder_lr: 5e-7
  decoder_lr: 3e-4
  predictor_lr: 1e-5
  action_encoder_lr: 1e-5 # decreasing from 5e-4
  bisim_lr: 5e-5  # Learning rate for bisimulation model # increased from 5e-7 to escape collapse

img_size: 224 # 224 for point_maze and wall
frameskip: 5
concat_dim: 1

normalize_action: True

# action encoder
action_emb_dim: 10
num_action_repeat: 1

# proprio encoder
proprio_emb_dim: 10
num_proprio_repeat: 1

# bisimulation model settings
has_bisim: True  # Enable bisimulation model
bisim_latent_dim: 64  # Latent dimension for bisimulation model
bisim_hidden_dim: 2048  # Hidden dimension for bisimulation model
bisim_coef: 1  # Coefficient for bisimulation loss
var_loss_coef: 1
PCA1_loss_target: 0.0001
VC_target: 0.5  # lowered from 1.0 — DINOv2 natural variance ~0.3, old target was unreachable
num_pcs: 10
PCAloss_epoch: 2000
bisim_memory_buffer_size: 1000  # Size of memory buffer for cross-batch bisimulation (0 = disabled)
bisim_comparison_size: 200  # Total number of states to compare in bisimulation learning

# Bisim extra regularization: "pca" (default, hinge/PCA var + per-patch cov) or "vicreg"
regularization: pca
vicreg_inv_coef: 25.0
vicreg_var_coef: 25.0
vicreg_cov_coef: 1.0
vicreg_std_min: 1.0
# Weak-SIGReg (covariance-to-I) sketch size when regularization=sigreg
sigreg_sketch_dim: 64

num_hist: 3
num_pred: 1 # only supports 1
has_predictor: True # set this to False for only training a decoder
has_decoder: False # set this to False for only training a predictor

accelerate_launch: False

model:
  _target_: models.visual_world_model.VWorldModel
  image_size: ${img_size}
  num_hist: ${num_hist}
  num_pred: ${num_pred}
  train_encoder: False
  train_predictor: True
  train_decoder: True
  train_bisim: True  # Control whether to train the bisimulation model
  bypass_dinov2: False  # If True, train obs -> bisim directly, bypassing DinoV2

  train_w_std_loss: True
  train_w_reward_loss: False

debug: False 

# Planning params for planning eval jobs launched during training
plan_settings: 
  # plan_cfg_path: conf/plan.yaml # set to null for no planning evals
  plan_cfg_path: null 
  planner: ['gd', 'cem']
  goal_source: ['dset', 'random_state']
  goal_H: [5]
  alpha: [0.1, 1]
