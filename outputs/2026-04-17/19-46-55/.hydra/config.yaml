ckpt_base_path: .
training:
  seed: 0
  epochs: 100
  batch_size: 40
  save_every_x_epoch: 1
  reconstruct_every_x_batch: 500
  num_reconstruct_samples: 6
  encoder_lr: 5.0e-07
  decoder_lr: 0.0003
  predictor_lr: 1.0e-05
  action_encoder_lr: 1.0e-05
  bisim_lr: 5.0e-05
img_size: 224
frameskip: 5
concat_dim: 1
normalize_action: true
action_emb_dim: 10
num_action_repeat: 1
proprio_emb_dim: 10
num_proprio_repeat: 1
has_bisim: true
bisim_latent_dim: 64
bisim_hidden_dim: 2048
bisim_coef: 1
var_loss_coef: 1
PCA1_loss_target: 0.0001
VC_target: 0.5
num_pcs: 10
PCAloss_epoch: 2000
bisim_memory_buffer_size: 1000
bisim_comparison_size: 200
num_hist: 3
num_pred: 1
has_predictor: true
has_decoder: false
accelerate_launch: false
model:
  _target_: models.visual_world_model.VWorldModel
  image_size: ${img_size}
  num_hist: ${num_hist}
  num_pred: ${num_pred}
  train_encoder: false
  train_predictor: true
  train_decoder: true
  train_bisim: true
  bypass_dinov2: false
  train_w_std_loss: true
  train_w_reward_loss: false
debug: false
plan_settings:
  plan_cfg_path: null
  planner:
  - gd
  - cem
  goal_source:
  - dset
  - random_state
  goal_H:
  - 5
  alpha:
  - 0.1
  - 1
env:
  name: pusht
  args: []
  kwargs:
    with_velocity: true
    with_target: true
  dataset:
    _target_: datasets.pusht_dset.load_pusht_slice_train_val
    with_velocity: true
    n_rollout: null
    normalize_action: ${normalize_action}
    data_path: ${oc.env:DATASET_DIR}/pusht_noise
    split_ratio: 0.9
    transform:
      _target_: datasets.img_transforms.default_transform
      img_size: ${img_size}
  decoder_path: null
  num_workers: 16
encoder:
  _target_: models.dino.DinoV2Encoder
  name: dinov2_vits14
  feature_key: x_norm_patchtokens
action_encoder:
  _target_: models.proprio.ProprioceptiveEmbedding
  num_frames: 1
  tubelet_size: 1
  use_3d_pos: false
proprio_encoder:
  _target_: models.proprio.ProprioceptiveEmbedding
  num_frames: 1
  tubelet_size: 1
  use_3d_pos: false
decoder:
  _target_: models.vqvae.VQVAE
  channel: 384
  n_embed: 2048
  n_res_block: 4
  n_res_channel: 128
  quantize: false
predictor:
  _target_: models.vit.ViTPredictor
  depth: 6
  heads: 16
  mlp_dim: 2048
  dropout: 0.1
  emb_dropout: 0
  pool: mean
